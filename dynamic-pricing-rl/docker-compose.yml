version: '3.8'

services:
  # API Service - Primary service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dqn-pricing-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./checkpoints:/app/checkpoints
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn api.pricing_api:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: on-failure

  # Dashboard Service - Interactive UI
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dqn-pricing-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    restart: on-failure

  # Training Service (Optional, profile-based)
  training:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dqn-pricing-training
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./checkpoints:/app/checkpoints
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    command: python run.py
    profiles:
      - training
    restart: "no"

volumes:
  models:
  logs:
  checkpoints:
  data:

# Networks
networks:
  default:
    name: dqn-pricing-network

